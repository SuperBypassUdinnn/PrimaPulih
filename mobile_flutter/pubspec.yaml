name: prima_pulih
description: "PrimaPulih - Platform Monitoring Pemulihan Pasca-ICU berbasis Telemedicine."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # State Management
  provider: ^6.1.2

  # Local Storage (mock session)
  shared_preferences: ^2.3.3

  # Internationalization (format tanggal Bahasa Indonesia)
  intl: ^0.20.2

  # Calendar widget untuk home screen
  table_calendar: ^3.1.3

  # Google Fonts (Poppins)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
