<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <!-- Ground/base oval -->
  <ellipse cx="150" cy="195" rx="110" ry="20" fill="#E8F0F8"/>

  <!-- Leaves left back -->
  <ellipse cx="30" cy="160" rx="24" ry="35" fill="#4EC38A" transform="rotate(-20 30 160)"/>
  <ellipse cx="50" cy="145" rx="18" ry="28" fill="#3DAF78" transform="rotate(-10 50 145)"/>

  <!-- Leaves right back -->
  <ellipse cx="270" cy="155" rx="24" ry="35" fill="#4EC38A" transform="rotate(20 270 155)"/>
  <ellipse cx="252" cy="142" rx="18" ry="28" fill="#3DAF78" transform="rotate(10 252 142)"/>

  <!-- Small clouds -->
  <ellipse cx="60" cy="40" rx="30" ry="14" fill="white" opacity="0.9"/>
  <ellipse cx="42" cy="46" rx="18" ry="12" fill="white" opacity="0.9"/>
  <ellipse cx="78" cy="46" rx="20" ry="12" fill="white" opacity="0.9"/>
  <ellipse cx="230" cy="30" rx="24" ry="11" fill="white" opacity="0.9"/>
  <ellipse cx="215" cy="36" rx="14" ry="9" fill="white" opacity="0.9"/>
  <ellipse cx="244" cy="36" rx="16" ry="9" fill="white" opacity="0.9"/>

  <!-- Phone body -->
  <rect x="80" y="30" width="100" height="150" rx="14" fill="white" stroke="#4444CC" stroke-width="5"/>
  <!-- Phone screen -->
  <rect x="90" y="44" width="80" height="122" rx="6" fill="#F0F5FF"/>
  <!-- Check circle on screen -->
  <circle cx="130" cy="88" r="26" fill="#4444CC"/>
  <polyline points="117,88 126,97 143,76" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Girl character (simplified) -->
  <!-- Body -->
  <ellipse cx="195" cy="148" rx="22" ry="32" fill="#E85555"/>
  <!-- Legs -->
  <rect x="185" y="172" width="10" height="24" rx="5" fill="#333"/>
  <rect x="197" y="172" width="10" height="24" rx="5" fill="#333"/>
  <!-- Shoes -->
  <ellipse cx="190" cy="196" rx="10" ry="5" fill="#CC2222"/>
  <ellipse cx="202" cy="196" rx="10" ry="5" fill="#CC2222"/>
  <!-- Head -->
  <circle cx="196" cy="112" r="20" fill="#FBBF7A"/>
  <!-- Hair -->
  <ellipse cx="196" cy="97" rx="20" ry="10" fill="#222"/>
  <path d="M176 106 Q172 130 180 140" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M212 108 Q220 122 214 140" stroke="#222" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="190" cy="115" r="3" fill="#333"/>
  <circle cx="202" cy="115" r="3" fill="#333"/>
  <!-- Smile -->
  <path d="M188 122 Q196 128 204 122" stroke="#E05050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M176 132 Q165 118 168 108" stroke="#FBBF7A" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Shield held by girl -->
  <path d="M152 100 L152 130 Q152 142 163 148 Q174 142 174 130 L174 100 L163 95 Z" fill="#4444CC"/>
  <line x1="163" y1="104" x2="163" y2="138" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="155" y1="121" x2="171" y2="121" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M214 130 Q222 118 218 108" stroke="#FBBF7A" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Key (bottom left) -->
  <circle cx="72" cy="175" r="12" fill="#E8A020" stroke="#C88010" stroke-width="2"/>
  <circle cx="72" cy="175" r="6" fill="#F0BC40"/>
  <rect x="82" y="172" width="24" height="5" rx="2.5" fill="#E8A020"/>
  <rect x="100" y="172" width="5" height="9" rx="2.5" fill="#E8A020"/>
  <rect x="94" y="172" width="4" height="7" rx="2" fill="#E8A020"/>

  <!-- Padlock (bottom right) -->
  <rect x="218" y="158" width="36" height="30" rx="5" fill="#F5C032" stroke="#C8A020" stroke-width="2"/>
  <path d="M226 158 L226 148 Q226 138 236 138 Q246 138 246 148 L246 158" stroke="#C8A020" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="236" cy="170" r="5" fill="#C8A020"/>
  <rect x="233.5" y="173" width="5" height="8" rx="2" fill="#C8A020"/>
  <!-- Light bulb highlight -->
  <circle cx="236" cy="168" r="2" fill="white" opacity="0.5"/>
</svg>
