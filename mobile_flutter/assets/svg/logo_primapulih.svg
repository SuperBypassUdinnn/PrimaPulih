<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background gradient rounded square -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E6BB8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- WiFi/Signal arcs above head (teal) -->
  <path d="M28 32 Q50 18 72 32" stroke="#2ECFCF" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M34 38 Q50 28 66 38" stroke="#2ECFCF" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Person head silhouette (white) -->
  <ellipse cx="50" cy="52" rx="14" ry="16" fill="white"/>
  <!-- Neck -->
  <rect x="45" y="64" width="10" height="8" rx="3" fill="white"/>
  <!-- Shoulders -->
  <ellipse cx="50" cy="76" rx="20" ry="10" fill="white" opacity="0.9"/>

  <!-- Heartbeat line inside head -->
  <polyline points="36,52 40,52 43,44 46,60 49,48 52,56 55,52 64,52"
    stroke="#4A90D9" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Medical shield (bottom right) -->
  <path d="M62 58 L62 70 Q62 76 68 78 Q74 76 74 70 L74 58 L68 56 Z" fill="url(#shieldGrad)"/>
  <line x1="68" y1="61" x2="68" y2="73" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62.5" y1="67" x2="73.5" y2="67" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
