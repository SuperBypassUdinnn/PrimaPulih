<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <!-- Body / shirt -->
  <rect x="28" y="112" width="64" height="28" rx="14" fill="#7BBFEA"/>
  <!-- Neck -->
  <rect x="50" y="96" width="20" height="18" rx="6" fill="#FBBF7A"/>
  <!-- Head tilted slightly, resting on hand -->
  <ellipse cx="60" cy="72" rx="36" ry="38" fill="#FBBF7A"/>
  <!-- Hair -->
  <ellipse cx="60" cy="42" rx="36" ry="16" fill="#7D4E2A"/>
  <ellipse cx="30" cy="52" rx="10" ry="12" fill="#7D4E2A"/>
  <ellipse cx="90" cy="52" rx="10" ry="12" fill="#7D4E2A"/>
  <!-- Hand on chin -->
  <ellipse cx="42" cy="102" rx="14" ry="10" fill="#FBBF7A"/>
  <rect x="30" y="98" width="12" height="22" rx="6" fill="#FBBF7A"/>
  <!-- Confused eyes -->
  <ellipse cx="47" cy="68" rx="6" ry="6.5" fill="white"/>
  <ellipse cx="73" cy="68" rx="6" ry="6.5" fill="white"/>
  <circle cx="47" cy="69" r="3.2" fill="#3A2410"/>
  <circle cx="73" cy="69" r="3.2" fill="#3A2410"/>
  <circle cx="48.2" cy="67.5" r="1.1" fill="white"/>
  <circle cx="74.2" cy="67.5" r="1.1" fill="white"/>
  <!-- Question marks -->
  <text x="16" y="58" font-size="12" fill="#888" font-family="sans-serif">?</text>
  <text x="92" y="52" font-size="12" fill="#888" font-family="sans-serif">?</text>
  <!-- One raised eyebrow -->
  <path d="M40 60 Q47 57 54 61" stroke="#7D4E2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 58 Q73 62 80 60" stroke="#7D4E2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Wavy confused mouth -->
  <path d="M44 84 Q50 79 56 84 Q62 89 68 84 Q72 80 76 84" stroke="#B07050" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
